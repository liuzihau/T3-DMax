#
# T3-D, multi-GPU variant -- strict A1 baseline (full fine-tuning, brief sec 16).
#
# Tested at minimum on 2 x H200 (141GB each). With FSDP2 sharding the ~256GB of
# optimizer + master weight state divides across ranks (~128GB per GPU at 2 GPUs;
# ~32GB per GPU at 8 GPUs). 2 GPUs is tight but workable. >= 4 is comfortable.
#
# What's different from the 1gpu yaml:
#   - data_parallel_mode: fsdp2
#   - init_device: meta (fsdp2 requires this; meta defers materialization until shard)
#   - enable_full_shard: true (FSDP shards params + grads + opt state)
#   - broadcast_model_weights_from_rank0: true
#   - config_path: think_talk_llada2_mini (train_think=true; full FT)
#
# Launch:
#   PYTHONPATH=$(pwd)/dFactory/VeOmni:$PYTHONPATH \
#   sh dFactory/train.sh \
#     dFactory/tasks/train_t3_dmax_bd_oput.py \
#     dFactory/configs/sft/t3_llada2_mini_bd_oput_2gpu.yaml
# Make sure NPROC_PER_NODE in train.sh matches your GPU count (or `nvidia-smi --list-gpus | wc -l`).

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  # T3-D architecture (consumed via config.json)
  talk_num_layers: 2
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: true                     # full FT for A1
  train_talk: true
  train_lm_head: true

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.75
  noise_range_high: 0.75
  num_workers: 16

train:
  output_dir: ./t3_llada2_mini_bd_oput_2gpu_outputs

  # Distributed -- FSDP2 sharding
  data_parallel_mode: fsdp2
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8                  # matches DMax
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser (matches DMax)
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 2.0e-6
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- multi-GPU FSDP2 specific
  enable_mixed_precision: true
  enable_gradient_checkpointing: true
  enable_full_shard: true               # FSDP2 shards across ranks
  enable_fsdp_offload: false            # flip to true if 2-GPU still OOMs
  enable_activation_offload: false
  init_device: meta                     # fsdp2 mandates meta init
  broadcast_model_weights_from_rank0: true
  enable_full_determinism: false
  empty_cache_steps: 500

  # Checkpointing
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_epochs: 1
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # T3-D: OPUT rollout
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  mask_token_id: 156895

  # Logging
  use_wandb: false
  log_steps: 1
