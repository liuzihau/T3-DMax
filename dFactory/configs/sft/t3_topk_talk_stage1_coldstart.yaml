# T3-D top-K talk — STAGE 1: off-policy COLD START (teacher-forced).
#
# Per OPD analysis (THUNLP arXiv:2604.13016 §5.1): on-policy-from-scratch FAILS; you must
# first SFT the student off-policy on teacher rollouts, THEN do on-policy from THAT ckpt.
# Stage 1 = pure teacher-forced top-K (rollout OFF). Stage 2 (t3_topk_talk_stage2_onpolicy.yaml)
# initialises from this checkpoint. See probe_runner/T3D_TOPK_TALK_METHOD.md §4.3.
#
# Launch:  PYTHONPATH=$(pwd)/VeOmni:$PYTHONPATH \
#          sh train.sh tasks/train_t3_topk_talk.py configs/sft/t3_topk_talk_stage1_coldstart.yaml

model:
  config_path: ../merged_10L          # init = the untrained 10-layer merge
  model_path: ../merged_10L
  tokenizer_path: ../merged_10L
  attn_implementation: sdpa
  moe_implementation: fused

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.75            # mask-ratio curriculum: start at 75% ...
  noise_range_high: 1.0            # ... ramp to 100% (inference block-start condition) once learned
  num_workers: 16

train:
  output_dir: ./t3_topk_stage1_coldstart_outputs

  think_path: ../DMax-Math-16B-moe-merge
  t3_top_k: 10
  t3_train_layers: "5,6,7,8,9"          # CAPACITY: back half (~3.7B) — diagnostic showed 2 layers too weak.
                                        #   merged-only "6,8" (1.6B) ← here (5,6,7,8,9) ← all-10 "0,..,9" (7.4B, needs multi-GPU)
  t3_mask_token_id: 156895
  t3_rollout_commit_frac: 0.0           # ROLLOUT OFF -> pure teacher-forced cold start
  t3_commit_threshold: 0.3
  t3_curriculum_step: 0.5               # CURRICULUM: 3-step reveal-ratio ramp 25%->12.5%->0% (sigma 0.75/0.875/1.0).
                                        #   advance one step each time the talk beats think (acc_tf>acc_think).
  t3_full_mask_after_acc: 0.5           # acc floor: don't advance on early noise (real gate = talk beats think).

  # Path-A think->talk distillation (NEW): on the mask path, forward the frozen 16B think and
  # add forward-KL(think||talk) at the predict positions, so think's dark knowledge (full top-K)
  # trains the talk instead of one-hot gold alone. Mass-covering -> cold-start alignment to parity.
  # alpha/beta/temp are PROVISIONAL (pending discussion); beta=0 reverts to legacy pure-gold-CE.
  t3_distill_beta: 1.0                   # KL(think||talk) weight on Path A
  t3_distill_alpha: 1.0                  # gold-CE weight on Path A (keep, so think's errors are corrected)
  t3_distill_temp: 1.0                   # softmax temperature (2.0 = classic Hinton softening)

  t3_val_every: 200
  t3_val_size: 64
  t3_keep_best_n: 2        # keep the LATEST 2 ckpt dirs (retention is now keep-latest, not best-ce —
                           # right under the curriculum). ~2x32GB on disk; set 1 if storage is very tight.

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2
  max_steps: 10000                      # generous CAP — interrupt on plateau (see below), don't run it all.
                                        #   (full epoch = 174854 steps ~= 97h; never needed — ce plateaus early.)
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-5
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory — back-half (~3.7B trainable) on 1 GPU (think 32 + talk 16 + ~30GB opt ≈ 80GB). If OOM:
  # drop to "6,8", or go multi-GPU (fsdp2 + enable_full_shard) for all-10.
  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 1000                      # frequent saves so interrupting never loses much (best-N kept)
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  use_wandb: false
  log_steps: 1
