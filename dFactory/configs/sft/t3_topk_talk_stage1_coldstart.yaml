# T3-D top-K talk — STAGE 1: off-policy COLD START (think gate-reveal + pure gold CE).
#
# REDESIGN (T3D_STAGE12_REDESIGN_PLAN.md): the reveal is no longer a random sigma-curriculum
# gold reveal. Data is sigma=1.0 full-mask (noise_range 1.0/1.0); the trainer regenerates the
# reveal by running THINK's PER-BLOCK contiguous decode-to-gate (inference-shaped, imperfect
# commits) over the noisy half. Committed = think's argmax (HARD, revised toward gold by CE);
# still-masked = bare [MASK] (Path A) / think top-K soft (Path B). Loss = PURE gold CE on the
# WHOLE response (committed + still-masked). NO KL, NO distill, NO sigma-curriculum.
# Gate: fixed t3_stage1_warmup_gate for the first t3_stage1_warmup_steps, then U(0, gate_max).
# Stage 2 (t3_topk_talk_stage2_onpolicy.yaml) initialises from this checkpoint.
#
# Launch:  PYTHONPATH=$(pwd)/VeOmni:$PYTHONPATH \
#          sh train.sh tasks/train_t3_topk_talk.py configs/sft/t3_topk_talk_stage1_coldstart.yaml

model:
  config_path: ../merged_10L          # init = the untrained 10-layer merge
  model_path: ../merged_10L
  tokenizer_path: ../merged_10L
  attn_implementation: sdpa
  moe_implementation: fused

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0            # sigma=1.0 FULL MASK — the reveal is regenerated in-trainer by
  noise_range_high: 1.0           # think's per-block decode-to-gate (NOT a data-pipeline sigma curriculum)
  num_workers: 16

train:
  output_dir: ./t3_topk_stage1_coldstart_outputs

  think_path: ../DMax-Math-16B-moe-merge
  t3_top_k: 10
  t3_train_layers: "5,6,7,8,9"          # CAPACITY: back half (~3.7B) — diagnostic showed 2 layers too weak.
                                        #   merged-only "6,8" (1.6B) ← here (5,6,7,8,9) ← all-10 "0,..,9" (7.4B, needs multi-GPU)
  t3_mask_token_id: 156895
  t3_rollout_commit_frac: 0.0           # ROLLOUT OFF -> Stage-1 (gate-reveal + gold CE). >0 = Stage 2.
  t3_commit_threshold: 0.6              # think's per-block confident-prefix commit threshold (toy-validated quality)

  # --- Stage-1 think gate-reveal (replaces the old sigma-curriculum + distill/weighting) ---
  # The trainer runs think's PER-BLOCK decode-to-gate: decode every block until its committed
  # fraction (of originally-masked positions) >= gate, snapshotting each block at the iter it
  # FIRST crosses the gate (its committed prefix + still-masked top-K). The talk then trains
  # pure gold CE over the whole response from that revealed state.
  t3_stage1_warmup_steps: 2000          # first N steps: FIXED gate (warm-up); after: U(0, gate_max)
  t3_stage1_warmup_gate: 0.4            # the fixed warm-up gate
  t3_stage1_gate_max: 0.6               # after warm-up: gate ~ U(0, this) per micro-batch
  t3_converge_max_iters: 8              # cap on think's per-block decode iters (compute guard)

  t3_val_every: 200
  t3_val_size: 64
  t3_keep_best_n: 2        # keep the LATEST 2 ckpt dirs (retention is now keep-latest, not best-ce —
                           # right under the curriculum). ~2x32GB on disk; set 1 if storage is very tight.

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 1
  max_steps: 30000                      # generous CAP — interrupt on plateau (see below), don't run it all.
                                        #   (full epoch = 174854 steps ~= 97h; never needed — ce plateaus early.)
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-5
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory — back-half (~3.7B trainable) on 1 GPU (think 32 + talk 16 + ~30GB opt ≈ 80GB). If OOM:
  # drop to "6,8", or go multi-GPU (fsdp2 + enable_full_shard) for all-10.
  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 1000                      # frequent saves so interrupting never loses much (best-N kept)
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  use_wandb: false
  log_steps: 1
