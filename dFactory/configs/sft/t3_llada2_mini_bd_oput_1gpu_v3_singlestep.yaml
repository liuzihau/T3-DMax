# T3-D v3 SINGLE-STEP (diagnostic). Same architecture + hyperparameters as v2;
# only the training/decoding LOOP changes.
#
# Per block (train == inference):
#   1. think once -> anchor + iter-0 logits.
#   2. think commits the left prefix via DMax decode_uniform (left-to-right,
#      contiguous, threshold 0.3) -> 1..k tokens decoded, rest still MASK.
#   3. talk runs ONCE -> predict ground truth at ALL originally-masked positions
#      (committed + still-masked, so talk can FIX think's wrong commits).
#   No multi-iteration, no OPUT rollout, no mask/rollout split.
#
# sigma is FIXED at 1.0 (whole response block masked) -> train/inference parity.
# Goal is the DIAGNOSTIC: does train loss drop AND does val acc hold (esp.
# val/acc_still_masked = talk's leak-free job) for the REAL talk on FULL data --
# unlike the data-starved offline probe.
#
# Watch on wandb:
#   training/loss              -- should go DOWN
#   training/loss_mask_region  -- STILL-MASKED train CE (talk's real job)
#   training/loss_committed    -- CE on think-committed positions (partly leaky)
#   t3/think_commit_frac/_acc  -- how much / how well think pre-decodes
#   t3/talk_acc_still_masked   -- talk train acc on still-masked
#   val/acc_still_masked_*     -- THE generalization number to watch
#   val/acc_committed_*, val/think_commit_acc_*

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0                  # sigma FIXED at 1.0 (whole block masked)
  noise_range_high: 1.0
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v3_singlestep_xattn_talk4_FROZEN_anchorDELTA_sigma100_thr03

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # === T3-D v3 SINGLE-STEP ===
  t3_single_step: true                  # think iter-0 commit -> talk ONCE
  t3_reveal_threshold: 0.3              # think iter-0 decode_uniform commit threshold
  mask_token_id: 156895
  t3_rollout_mode: dmax_oput            # (ignored in single-step)
  t3_rollout_target: talk_only          # (ignored in single-step)
  t3_rollout_replace: all_masked        # (ignored in single-step)
  # Multi-iter + rollout curriculum disabled (single-step ignores all of these):
  t3_train_iterations: 1
  t3_train_iterations_min: 1
  t3_n_iter_gate: 0
  t3_sigma_gate: 0.0
  t3_rollout_ratio_low: 0.0
  t3_rollout_ratio_high: 0.0
  t3_rollout_ratio_gate: 0.0
  # ===========================

  # Inline validation -- single-step (think commit -> talk once), reports CE + acc
  # split into committed vs still-masked at sigma 1.0. Frequent for the diagnostic.
  t3_val_every: 1000
  t3_val_tail: 50
  t3_val_sigmas: "1.0"

  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v3_singlestep_xattn_talk4_FROZEN_anchorDELTA_sigma100_thr03
  log_steps: 1
