#
# Smoke test for Strategy C: differential LR.
# Talk + alpha + anchor at lr=1e-4, LM head at lr=1e-4 * 0.05 = 5e-6.
#
# Purpose: validate the differential-LR optimizer split before committing it to
# a 4-day run. ~1 hour on one H200.
#
# Expected behavior:
# - Startup log should print "[T3-D differential LR] talk+alpha+anchor: lr=1.00e-04,
#   lm_head: lr=5.00e-06 (ratio=0.05)..." before training starts.
# - Loss should descend on a similar trajectory to the original smoke (11.97 -> ~9 by step 250),
#   maybe slightly slower because LM head adapts more conservatively.
# - If loss stays at 11.97 or NaNs, the optimizer-split logic is broken; do not launch
#   the 4-day run with this until fixed.

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  talk_num_layers: 2
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: true

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.75
  noise_range_high: 0.75
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_smoke_diff_lr

  # SMOKE-SPECIFIC
  max_steps: 500
  save_steps: 250
  save_epochs: 0
  empty_cache_steps: 100

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- Strategy C: differential LR
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4                            # talk + alpha + anchor group
  lr_lm_head_ratio: 0.05                # lm_head group gets 1e-4 * 0.05 = 5e-6
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  mask_token_id: 156895

  use_wandb: false
  log_steps: 1
