# DBet drafter training -- SINGLE-GPU variant (validation / pipeline smoke on one H200).
#
# Why a separate file: VeOmni only enables FSDP when fsdp_size = world_size/(pp*tp) > 1. On 1 GPU FSDP is
# OFF, which FORBIDS init_device=meta and enable_fsdp_offload (build_parallelize_model raises
# "Only FSDP training supports init_device=cpu or init_device=meta"). So on 1 GPU we must build eagerly on
# cuda (the loader loads weights directly) and not shard/offload. The frozen 16B heavy fits: its forward runs
# under torch.no_grad() (no retained activations); fp32 heavy ~64GB + drafter + Adam ~ fits in 140GB.
# Because the model is returned UNWRAPPED on 1 GPU, dbet_train_step's model.heavy/model.draft access just works.
#
# For the real MULTI-GPU run use configs/sft/dbet_bd.yaml (meta + fsdp2 + offload), launched on N>1 GPUs.
#
# Build the init checkpoint first (once):
#   PYTHONPATH=$(pwd)/VeOmni:$(pwd):$PYTHONPATH python scripts/build_dbet_init.py \
#       --heavy_path ../DMax-Math-16B-moe-merge --out_dir ./dbet_init --draft_num_layers 5 --sel_layers 1,10,19
# Then launch:
#   PYTHONPATH=$(pwd)/VeOmni:$(pwd):$PYTHONPATH bash train.sh tasks/train_dbet.py configs/sft/dbet_bd_1gpu.yaml
model:
  config_path: ./dbet_init
  model_path: ./dbet_init
  tokenizer_path: ../DMax-Math-16B-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

data:
  train_path: ./my_data/postprocess_train.jsonl   # EDIT to your real OPUT math data (build_dataset_oput.py)
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.4              # mask ratio sigma in [low,high]; reveal = 1-sigma. [0.4,1.0] -> reveal 0%-60%
  noise_range_high: 1.0            #   (dynamic reveal; was fixed 0.75/0.75 = 25% reveal)
  revealed_corrupt_rate: 0.0       # EAGLE-style aug: prob to corrupt each revealed answer token (noisy stream).
                                   #   0 = off; try 0.05-0.15 so the drafter is robust to heavy-decode errors.
  num_workers: 16

train:
  output_dir: ./dbet_outputs
  data_parallel_mode: ddp          # MUST be ddp here: fsdp2 asserts init_device==meta (arguments.py:599).
                                   #   On 1 GPU fsdp_enabled=False so no DDP wrap happens -> model stays unwrapped.
                                   #   For the real multi-GPU run use dbet_bd.yaml (fsdp2 + meta) instead.
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 1
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4                         # fp32 training is stable at higher lr (bf16 NaN'd at 1e-4 ~87k steps; fp32 won't).
                                    #   DFlash trains its draft model at 6e-4 (cosine, warmup 0.04) -- can push toward
                                    #   that in fp32. If running bf16 (enable_mixed_precision:false) drop to ~5e-5.
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0
  enable_mixed_precision: true      # FP32 TRAINING on 1 GPU: builds fp32 + model.float(); train_dbet.py then keeps
                                    #   ONLY the routed-expert weights bf16 (the fused MoE kernel needs bf16 experts
                                    #   but casts activations itself), so the trainable drafter + optimizer are fp32.
                                    #   Stable (no bf16 weight drift) but ~62GB peak at load and slower than bf16.
                                    #   Set FALSE for the faster/lighter bf16 path (~32GB; needs low lr + skip guard).
  enable_gradient_checkpointing: true
  enable_full_shard: false          # 1-GPU: no FSDP sharding
  enable_fsdp_offload: false        # 1-GPU: offload is FSDP-only -> must be false
  enable_activation_offload: false
  init_device: cuda                 # 1-GPU: build + load weights eagerly on GPU (meta is FSDP-only)
  broadcast_model_weights_from_rank0: false
  empty_cache_steps: 500
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_epochs: 1
  save_hf_weights: true
  # --- DBet block-diffusion + drafter knobs ---
  block_diffusion_mode: true
  block_size: 32
  heavy_commit_threshold: 0.9
  conf_loss_weight: 1.0
  # --- loss-weight schedule over remaining positions (pick one via loss_decay_mode) ---
  loss_decay_mode: dbet            # 'dbet' (max(base^k,floor)) | 'dbet_twophase' | 'dflash' (exp(-k/gamma))
  loss_decay_base: 0.9             # 'dbet'
  loss_decay_floor: 0.1            #   (set 0.025 for the twophase method)
  loss_decay_head: 0.95            # 'dbet_twophase' gentle decay for first `window` tokens
  loss_decay_tail: 0.8             # 'dbet_twophase' steep decay after `window`
  loss_decay_window: 6             # 'dbet_twophase' first-T boundary
  loss_decay_gamma: 14.0           # 'dflash' exp(-k/gamma); ~block_size/2 (paper 7@bs16)
  same_token_labels: true
  # --- metrics + held-out validation (figures via scripts/plot_dbet_metrics.py) ---
  use_wandb: false                  # set true to also stream to Weights & Biases (wandb_project/wandb_name)
  log_steps: 20                     # write a train-metrics JSONL record (loss/tok/conf/acc) every N steps
  eval_steps: 200                   # held-out sigma-sweep eval every N steps (0 disables); ~1 min each at holdout 128
  eval_holdout_size: 128            # tail examples of the train file held out for validation
  eval_sigmas: "0.1,0.3,0.5,0.7,0.9"
  eval_at_start: true               # step-0 baseline (untrained drafter) point for the figures
  eval_tpf: 6                       # heavy tokens/forward window: acc6/top*_6/h2_acc6 avg over first 6 positions
  eval_heavy_second: true           # also report heavy 2nd-pass acc (teacher ceiling); ~2x eval cost
  # metrics_path: ""                # default -> <output_dir>/dbet_metrics.jsonl
  #
  skip_nonfinite_steps: true        # bf16 stability guard: skip optimizer step on NaN/Inf grad (don't poison weights)
  #
  # QUICK FIGURE RUN (see real learning in ~30-60 min instead of 60h): append CLI overrides, e.g.
  #   --train.max_steps 3000 --train.lr_warmup_ratio 0.05 --train.lr 1.0e-4 --train.eval_steps 250
  # then: python scripts/plot_dbet_metrics.py --metrics ./dbet_outputs/dbet_metrics.jsonl
