# T3-D v3 — PROGRESSIVE-DISTILLATION curriculum on the DMax-Math-16B backbone.
#
# Same single-step paradigm and inference config (think-once + talk-once) as
# t3_dmax16b_bd_oput_1gpu_v3_singlestep.yaml; the ONLY change is a training
# curriculum on the number of THINK iterations:
#   t3_think_iters_start=3, anneal_frac=0.25  ->  think 3 (0-25%) / 2 (25-50%) / 1 (>=50%).
# Talk always does ONE grad forward, on think's LATEST anchor + the k-committed input.
#
# Idea (progressive distillation, a la few-step diffusion samplers): bootstrap talk
# from easy cases (think did 3 iters -> mostly-decoded block + best anchor) and
# anneal to the hard single-step (think 1) it'll face at inference. think's K iters
# are HARD-token commits (reveal_dmax_uniform) for now; soft-mix is a faithful
# upgrade we can add later.
#
# Inference is UNCHANGED (think 1 + talk 1) -> the K=1 endpoint has NO train/infer
# gap; intermediate K>1 is curriculum scaffolding only (latest-anchor, so the
# anchor/committed pair stays self-consistent but is off-distribution vs inference
# during phases 1-2 -- accepted).
#
# Validation is think-1 throughout, so `val/acc_still_masked_sigma_1.00` is DIRECTLY
# comparable to the cold-start single-step run: if it climbs above that run's ~0.20,
# the curriculum helped.
#
# PREREQUISITE: same backbone-arch sanity as the single-step DMax-16B yaml
# (DMax-Math-16B is a finetune of LLaDA-2.0-mini -> reuse the mini ThinkTalk config).

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4
  model_path: ../DMax-Math-16B
  tokenizer_path: ../DMax-Math-16B
  attn_implementation: sdpa
  moe_implementation: fused

  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0                  # sigma FIXED at 1.0
  noise_range_high: 1.0
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v3_distill_DMAX16B_thinkiters3_xattn_talk4_FROZEN_anchorDELTA_sigma100_thr03

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false            # flip true if the 16B + 3x think forwards OOM
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # === T3-D v3 SINGLE-STEP + DISTILLATION CURRICULUM ===
  t3_single_step: true
  t3_think_iters_start: 3               # think 3 -> 2 -> 1
  t3_think_iters_anneal_frac: 0.25      # step down every 25% of training
  t3_reveal_threshold: 0.3
  mask_token_id: 156895
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  t3_train_iterations_min: 1
  t3_n_iter_gate: 0
  t3_sigma_gate: 0.0
  t3_rollout_ratio_low: 0.0
  t3_rollout_ratio_high: 0.0
  t3_rollout_ratio_gate: 0.0
  # =====================================================

  # Validation: always think-1 (the inference config) -> directly comparable to the
  # cold-start single-step run.
  t3_val_every: 1000
  t3_val_tail: 50
  t3_val_sigmas: "1.0"

  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v3_distill_DMAX16B_thinkiters3_sigma100_thr03
  log_steps: 1
