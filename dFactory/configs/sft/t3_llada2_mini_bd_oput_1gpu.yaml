#
# T3-D, single-GPU variant -- v6e (v6d + MULTI-ITER training, A4).
#
# Background:
#   v2 plateaued at ~8.2 loss; v6b had lm_head drift catastrophe; v6c froze lm_head
#   but loss couldn't move (no useful gradient signal); v6d added tata-style zero-init
#   delta head -- loss started at LLaDA's CE 4.5 exactly, BUT descended slowly
#   (4.4 -> 4.29 over 2k steps with grad_norm 0.05). Diagnosis: single-iter training
#   gives talk only a thin gradient signal -- the model's input is just "masked" once
#   and CE is computed on that one input distribution.
#
# v6e design (tata-style architecture + multi-iter training):
#   ARCHITECTURE (unchanged from v6d):
#     hybrid_xattn (gated residual at layer 0 + cross-attn every layer) + 4-layer talk
#     + frozen lm_head + zero-init delta head.
#       delta_h      = delta_head(talk_hidden)          # = 0 EXACTLY at step 0
#       final_hidden = anchor[:, :L] + delta_h           # = anchor at step 0
#       logits       = lm_head(final_hidden)             # = LLaDA's logits at step 0
#
#   NEW: MULTI-ITER TRAINING (A4). Each training step runs N=5 talk forwards with grad:
#       iter 0: think once -> anchor; talk on raw masked input; CE loss; reveal
#       iter 1: talk on partially-revealed input; CE loss; reveal
#       iter 2: talk on more-revealed input; CE loss; reveal
#       iter 3: ...
#       iter 4: final iter, CE loss
#     Loss is the uniform mean of per-iter CE. Gradients accumulate (backward-per-iter).
#     The anchor (think's output) is computed ONCE and reused across all iterations,
#     matching inference where think runs once per block.
#
#   Reveal strategies (between iters, no-grad):
#     flag=False (mask path)    -> DMax-uniform reveal (per-block, left-to-right
#                                  confident prefix, threshold=0.5, fallback: commit
#                                  leftmost mask if no high-conf position).
#                                  Matches DMax inference behaviour.
#     flag=True  (rollout path) -> full argmax (replace ALL [MASK] positions with the
#                                  model's argmax each iter; no threshold). Harder
#                                  training distribution.
#
#   This restores the iterative-refinement gradient signal that single-iter elided.
#   talk now sees the inference-distribution range of inputs (raw -> partially
#   revealed -> mostly filled), with iter-specific gradient at each.
#
# Architecture summary:
#   1. Talk depth: 4 layers.
#   2. Hybrid anchor injection (anchor_injection_mode="hybrid_xattn"):
#        - Talk sequence is L (noisy positions only).
#        - Layer 0: gated residual injection (fixed gate 0.2).
#        - Every talk layer: cross-attn (Q from talk, KV from full 2L anchor).
#   3. Step-based mask-ratio ramp: sigma in [0.25, 1.00], linear over training.
#   4. Step-based rollout-flag ratio ramp: P(flag=True) in [0.25, 1.00], linear.
#   5. train_lm_head=false (frozen at LLaDA tied weights).
#   6. NEW IN v6d: add_anchor_skip_residual=true (late skip from anchor to lm_head input).
#
# Expected curve (very different from v6c):
#   - Step 0: loss should be CLOSE TO LLaDA's CE at training sigma -- so ~3-5, not 12.
#     If it's still 11-12 at step 0, the skip didn't fire correctly (check config.json).
#   - First ~5k steps: loss should descend quickly as talk learns to nudge the
#     anchor signal in useful directions.
#   - ~50k+: loss should be well below v6's eventual plateau if the architecture works.
#
# Everything else identical to v6:
#   - lr 1e-4, lr_warmup_ratio 0.005, depth-scaled talk init, bf16 DDP single H200.

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  # T3-D architecture knobs (consumed via config.json; listed here for visibility only --
  # VeOmni argparse drops them, the model_config dir is the source of truth)
  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false                  # v6c: frozen at LLaDA tied weights (see header)

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.50
  noise_range_high: 0.90
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v6e_xattn_talk4_FROZEN_anchorDELTA_multiITER5_lr1e4

  # Distributed -- single GPU, DDP wrap is a no-op
  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8                  # grad_accum = 8 to match DMax's per-step batch
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- LR bumped 50x from DMax's fine-tune setting; see file header
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005                # ~1750 warmup steps; previous 0.03 (10500 steps)
                                        # let the model settle in a stuck minimum at
                                        # low LR. Short warmup gets to peak in ~30 min.
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- single-GPU specific
  enable_mixed_precision: false         # DDP path stays in bf16; fused MoE asserts bf16/fp16
  enable_gradient_checkpointing: true
  enable_full_shard: false              # no FSDP on 1 GPU
  enable_fsdp_offload: false            # also requires FSDP
  enable_activation_offload: false
  init_device: cuda                     # meta requires fsdp_enabled (unreachable on 1 GPU)
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  # Checkpointing -- ~4-5h between intra-epoch saves on the 4-day run
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32                        # K=32 from the start (brief decision 3)
  same_token_labels: true

  # T3-D: OPUT rollout
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only          # think runs once on masked input; talk does rollout
  t3_rollout_replace: all_masked
  # T3-D v6e: multi-iter training (A4). Both flag=False (mask path, DMax-uniform reveal)
  # and flag=True (rollout path, full-argmax reveal) run this many talk forwards with
  # grad per training step. Loss = uniform mean of per-iter CE.
  t3_train_iterations: 5
  t3_reveal_threshold: 0.5              # DMax inference's default; mask-path reveal gate.
  mask_token_id: 156895
  # T3-D ADDED: rollout-flag ratio ramp. Each micro_batch's flag is resampled as
  # Bernoulli(threshold) with threshold ramping 0.50 -> 0.90 over training. Tightened
  # from v6d's [0.25, 1.0] now that multi-iter training makes both paths meaningful;
  # the extremes (no-rollout-at-all-early, full-rollout-at-end) were not useful.
  t3_rollout_ratio_low: 0.50
  t3_rollout_ratio_high: 0.90

  # T3-D ADDED: inline validation every N steps. Computes CE on the deterministic
  # tail-50 of the seed-shuffled training data, at fixed sigmas, single-forward (no
  # multi-iter, no rollout). Logs val/ce_{overall,mask,clean}_sigma_{0.50,0.75}.
  # Also runs once at step 0 as the baseline (should reproduce LLaDA's CE at the
  # eval-script numbers, confirming the zero-init delta head start-state).
  t3_val_every: 5000
  t3_val_tail: 50
  t3_val_sigmas: "0.5,0.75"

  # Logging -- set WANDB_API_KEY in env, or `wandb login` once before launch
  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v6e_xattn_talk4_FROZEN_anchorDELTA_multiITER5_lr1e4
  log_steps: 1
