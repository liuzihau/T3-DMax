#
# T3-D, single-GPU variant -- v6c (hybrid anchor injection + FROZEN lm_head).
#
# Background:
#   v2 (gated residual at layer 0, talk=2L, fixed gate 0.2) plateaued at loss ~8.2.
#   v4/v5 (concat_segment, talk=3L) plateaued at ~9 -- worse.
#   v6 (hybrid_xattn, 4 talk layers, ramped noise + rollout). At step 15000 the
#      training loss was ~4.5, BUT a weight diagnostic revealed:
#        * Cross-attn output projections still at depth-scaled init (ratios 1.02-1.21x).
#        * lm_head drifted to cosine-similarity 0.01 with LLaDA's tied word_embeddings.
#      Conclusion: trainable lm_head absorbed the gradient by drifting orthogonal to
#      LLaDA's vocab mapping, learning a flat-output prior. Talk never had to learn
#      to use the anchor because lm_head was already absorbing the loss.
#
# v6c design:
#   Same hybrid_xattn architecture as v6, but lm_head is now FROZEN at LLaDA's tied
#   word_embeddings. To minimise loss, talk's hidden states MUST decode (via LLaDA's
#   unchanged lm_head) to the correct tokens, which requires them to live in LLaDA's
#   embedding subspace -- which in turn forces talk to extract information from the
#   anchor (think's hidden states, which are already in that subspace). The cross-attn
#   pathway becomes the most efficient route; gradient flow should activate it.
#
# Architecture summary (unchanged from v6):
#   1. Talk depth: 4 layers.
#   2. Hybrid anchor injection (anchor_injection_mode="hybrid_xattn"):
#        - Talk sequence is L (noisy positions only).
#        - Layer 0: gated residual injection (fixed gate 0.2).
#        - Every talk layer: cross-attn (Q from talk, KV from full 2L anchor).
#   3. Step-based mask-ratio ramp: sigma in [0.25, 1.00], linear over training.
#   4. Step-based rollout-flag ratio ramp: P(flag=True) in [0.25, 1.00], linear.
#   5. NEW IN v6c: train_lm_head=false (frozen at LLaDA tied weights).
#
# Expected curve (different from v6):
#   - First ~5k steps: loss may be HIGHER than v6 (no lm_head shortcut available).
#     Could start at ~10-11.
#   - ~10-20k: cross-attn weights start moving (ratio > 2x init in diagnostic).
#   - ~50k+: if architecture is sound, loss drops below v6's plateau.
#   - End of training: eval mask_CE should approach LLaDA's per-sigma values.
#
# Everything else identical to v6:
#   - lr 1e-4, lr_warmup_ratio 0.005, depth-scaled talk init, bf16 DDP single H200.

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  # T3-D architecture knobs (consumed via config.json; listed here for visibility only --
  # VeOmni argparse drops them, the model_config dir is the source of truth)
  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false                  # v6c: frozen at LLaDA tied weights (see header)

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.25
  noise_range_high: 1.00
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v6c_xattn_talk4_FROZEN_lmhead_lr1e4

  # Distributed -- single GPU, DDP wrap is a no-op
  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8                  # grad_accum = 8 to match DMax's per-step batch
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- LR bumped 50x from DMax's fine-tune setting; see file header
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005                # ~1750 warmup steps; previous 0.03 (10500 steps)
                                        # let the model settle in a stuck minimum at
                                        # low LR. Short warmup gets to peak in ~30 min.
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- single-GPU specific
  enable_mixed_precision: false         # DDP path stays in bf16; fused MoE asserts bf16/fp16
  enable_gradient_checkpointing: true
  enable_full_shard: false              # no FSDP on 1 GPU
  enable_fsdp_offload: false            # also requires FSDP
  enable_activation_offload: false
  init_device: cuda                     # meta requires fsdp_enabled (unreachable on 1 GPU)
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  # Checkpointing -- ~4-5h between intra-epoch saves on the 4-day run
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32                        # K=32 from the start (brief decision 3)
  same_token_labels: true

  # T3-D: OPUT rollout
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only          # think runs once on masked input; talk does rollout
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  mask_token_id: 156895
  # T3-D ADDED: rollout-flag ratio ramp. Each micro_batch's flag is resampled as
  # Bernoulli(threshold) with threshold ramping 0.25 -> 0.75 over training. Pairs with the
  # noise-range ramp (0.25 -> 0.75) so both task difficulty and OPUT distribution share
  # the same curriculum: start easy (low sigma, mostly mask path), end hard (high sigma,
  # mostly rollout path matching inference).
  t3_rollout_ratio_low: 0.25
  t3_rollout_ratio_high: 1.00

  # Logging -- set WANDB_API_KEY in env, or `wandb login` once before launch
  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v6c_xattn_talk4_FROZEN_lmhead_lr1e4
  log_steps: 1
