#
# T3-D, single-GPU variant -- Strategy D (post-A failure).
#
# Trains talk model + anchor gate + LM head; think backbone frozen.
# Mirrors the smoke setup exactly -- smoke validated this descends from 11.97
# to ~9 in 250 steps. Strategy A (LM head also frozen) was attempted and
# stalled at loss ~11.4 after 15k steps; reverted here.
#
# Risk in this configuration: lr=1e-4 over 349k steps may drift the LM head
# from its LLaDA-pretrained values. We accept this risk for the milestone-1
# run; if the eventual GSM8K eval is degraded vs DMax (~90% target), the next
# experiment is Strategy C (differential LR with LM head at a lower rate).
#
# What's different from the 2gpu yaml:
#   - data_parallel_mode: ddp (FSDP needs world_size>1 to shard)
#   - init_device: cuda (meta init requires fsdp_enabled, unreachable on 1 GPU)
#   - enable_full_shard: false (no sharding with 1 GPU)
#   - enable_mixed_precision: false (fused MoE kernel requires bf16/fp16 weights)
#   - config_path: think_talk_llada2_mini_talk_only (think + LM head frozen; only
#     ~200M talk params + 1 alpha scalar train -- AdamW state fits trivially)
#   - lr: 1e-4 (smoke-validated; 50x DMax's 2e-6 fine-tune LR because talk is
#     trained from scratch, not fine-tuned)
#   - save_steps: 15000 (~4-5 hour gaps; resume protection for the ~4-day run)
#   - use_wandb: true (4-day unattended run; you want metrics off-server)
#
# Structure mirrors `dFactory/configs/sft/llada2_mini_bd_oput.yaml` from DMax (Apache-2.0,
# Copyright 2026 National University of Singapore).

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  # T3-D architecture knobs (consumed via config.json; listed here for visibility only --
  # VeOmni argparse drops them, the model_config dir is the source of truth)
  talk_num_layers: 2
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: true

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.75
  noise_range_high: 0.75
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_d_lmhead_train_lr1e4

  # Distributed -- single GPU, DDP wrap is a no-op
  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8                  # grad_accum = 8 to match DMax's per-step batch
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- LR bumped 50x from DMax's fine-tune setting; see file header
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- single-GPU specific
  enable_mixed_precision: false         # DDP path stays in bf16; fused MoE asserts bf16/fp16
  enable_gradient_checkpointing: true
  enable_full_shard: false              # no FSDP on 1 GPU
  enable_fsdp_offload: false            # also requires FSDP
  enable_activation_offload: false
  init_device: cuda                     # meta requires fsdp_enabled (unreachable on 1 GPU)
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  # Checkpointing -- ~4-5h between intra-epoch saves on the 4-day run
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32                        # K=32 from the start (brief decision 3)
  same_token_labels: true

  # T3-D: OPUT rollout
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only          # think runs once on masked input; talk does rollout
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  mask_token_id: 156895

  # Logging -- set WANDB_API_KEY in env, or `wandb login` once before launch
  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_d_lmhead_train_lr1e4
  log_steps: 1
