# T3-D top-K talk — STAGE 2: ON-POLICY MULTI-PASS rollout + REVERSE-KL distillation.
#
# Initialised from the Stage-1 cold start (THUNLP arXiv:2604.13016 §5.1: on-policy-from-scratch
# FAILS; "Only OPD" = running this from ../merged_10L). model_path below MUST be the Stage-1 hf_ckpt.
#
# DESIGN (T3D_STAGE2_DESIGN.md): ALWAYS full mask (no reveal curriculum -- Stage 1 already aligned the
# talk to think). Per micro-batch: a NO-GRAD priming pass seeds the talk's first commits, then J grad
# passes -- each runs think(X) as the TEACHER, the talk GRAD forward, loss = alpha*gold_CE +
# beta*REVERSE_KL(talk||think(X)), then commits the talk's OWN argmax and rolls X forward. BOTH paths
# (flag ~50/50) take CE+KL; they differ ONLY in the talk's still-masked input:
#   Path A (flag=False): bare [MASK]               (same input as think -> pure same-input distill)
#   Path B (flag=True):  the talk's OWN prev top-K (the inference dynamic; think candidates seed it ONCE)
# reverse-KL -> parity with think (H1); gold CE -> beat-think (H2). J is the ONLY curriculum -- it
# ANNEALS 2 -> 6 on a fixed STEP schedule (+1 every 2000 steps). think is fed the talk's HARD commits.
#
# Launch:  PYTHONPATH=$(pwd)/VeOmni:$PYTHONPATH NPROC_PER_NODE=1 \
#          sh train.sh tasks/train_t3_topk_talk.py configs/sft/t3_topk_talk_stage2_onpolicy.yaml

model:
  # <<< EDIT: point at the STAGE-1 checkpoint (the cold-start init), not merged_10L >>>
  config_path: ./t3_topk_stage1_coldstart_outputs/checkpoints/global_step_4000/hf_ckpt
  model_path:  ./t3_topk_stage1_coldstart_outputs/checkpoints/global_step_4000/hf_ckpt
  tokenizer_path: ../merged_10L
  attn_implementation: sdpa
  moe_implementation: fused

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0             # FULL MASK always (no reveal curriculum). low==high => no mask-ratio
  noise_range_high: 1.0            #   curriculum is created; every batch is the inference block-start.
  num_workers: 16

train:
  output_dir: ./t3_topk_stage2_onpolicy_outputs

  think_path: ../DMax-Math-16B-moe-merge
  t3_top_k: 10
  t3_train_layers: "5,6,7,8,9"          # same capacity scope as Stage 1 (back half)
  t3_mask_token_id: 156895

  # ---- Stage-2 on-policy MULTI-PASS rollout (the core of this stage) ----
  t3_rollout_commit_frac: 1.0           # ROLLOUT ON (the gate). Commit SELECTION = confidence-prefix below.
  t3_commit_threshold: 0.3              # DMax decode_uniform tau — matches inference commits
  t3_rollout_passes: 2                  # J START depth (J>=2)
  t3_rollout_passes_max: 6              # ANNEAL J 2->3->4->5->6 ...
  t3_rollout_passes_step_every: 2000    #   ... +1 every 2000 steps (deterministic; multi-GPU-safe)
  t3_seed_passes: 1                     # think seeds the FIRST pass (Path B); decoder reads this too
  t3_keep_mask_residual: true           # exact decode-time input (top-K + mask-residual + renorm)

  # ---- per-pass loss = alpha*gold_CE + beta*reverse_KL(talk||think(X)), BOTH paths ----
  t3_stage2_ce_alpha: 1.0               # gold-CE weight (H2). Bump if logged t3/s2_ce_raw << t3/s2_kl_raw.
  t3_stage2_kl_beta: 1.0                # reverse-KL weight (H1 parity). 0 = gold-CE-only A/B.
  t3_stage2_kl_temp: 1.0
  t3_kl_top_k: -1                       # -1 = FULL-vocab reverse KL; set 100 (=10*top_k) to truncate if OOM

  t3_val_every: 200                     # watch val/acc_roll, val/overlap_ratio (rising), val/entropy_gap
  t3_val_size: 64                       #   (narrowing), val/beat_roll; + t3/s2_ce_raw vs t3/s2_kl_raw
  t3_keep_best_n: 2

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 3
  max_steps: 12000                      # room for J to reach 6 (+1 every 2000 => J=6 at step ~8000) + tail.
                                        #   Interrupt early if acc_roll/overlap plateau before J=6.
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 5.0e-6                            # lower than Stage 1 (continuing from a trained ckpt; on-policy is harder)
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory/compute: J grad talk forwards (backward'd + freed PER pass -> ~1x talk graph) + ~J no-grad 16B
  # think TEACHER forwards (+1 Path-B seed) per micro-batch. At J=6 the think teacher forwards dominate
  # wall-clock; lower t3_rollout_passes_max or t3_kl_top_k if compute/memory-bound.
  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 2000
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  use_wandb: false
  log_steps: 1
