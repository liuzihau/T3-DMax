# T3-D top-K talk — STAGE 2: ON-POLICY MULTI-PASS rollout + KL to CONVERGED think.
#
# Initialised from the Stage-1 cold start (THUNLP arXiv:2604.13016 §5.1: on-policy-from-scratch
# FAILS; "Only OPD" = running this from ../merged_10L). model_path below MUST be the Stage-1 hf_ckpt.
#
# REDESIGN (T3D_STAGE12_REDESIGN_PLAN.md): ALWAYS full mask. think = gold/oracle, so there is NO
# dataset gold CE in this stage. The TEACHER is think_converge (think decoded to CONVERGENCE from
# the talk's CURRENT state, on a CLONE) -- a CLEAN target, NOT think's single-pass filler/deferral
# (the cause of the \n-collapse). Per micro-batch: a NO-GRAD priming pass (think seed commit ->
# talk commit) seeds the talk's first commits, then J grad passes -- each: think_converge(X) teacher,
# talk GRAD forward, loss = frac*forward_KL(think||talk) + (1-frac)*reverse_KL(talk||think) at predict
# positions, then commit the talk's OWN argmax and roll X forward. forward-dominant (GKD-style) keeps
# the talk calibrated; the reverse term sharpens. Paths differ ONLY in the still-masked input:
#   Path A (flag=False): bare [MASK]               (NEVER soft, incl. the prime)
#   Path B (flag=True):  the talk's OWN prev top-K (think seeds it ONCE at the prime)
# J STEP-curriculum: J = min(max, start + step // every) = 1 for [0,3k), 2 for [3k,6k), 3 for [6k+].
#
# Launch:  PYTHONPATH=$(pwd)/VeOmni:$PYTHONPATH NPROC_PER_NODE=1 \
#          sh train.sh tasks/train_t3_topk_talk.py configs/sft/t3_topk_talk_stage2_onpolicy.yaml

model:
  # <<< EDIT: point at the STAGE-1 checkpoint (the cold-start init), not merged_10L >>>
  config_path: ./t3_topk_stage1_window8_outputs/checkpoints/global_step_4000/hf_ckpt
  model_path:  ./t3_topk_stage1_window8_outputs/checkpoints/global_step_4000/hf_ckpt
  tokenizer_path: ../merged_10L
  attn_implementation: sdpa
  moe_implementation: fused

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0             # FULL MASK always (no reveal curriculum). low==high => no mask-ratio
  noise_range_high: 1.0            #   curriculum is created; every batch is the inference block-start.
  num_workers: 16

train:
  output_dir: ./t3_topk_stage2_window8_outputs

  think_path: ../DMax-Math-16B-moe-merge
  t3_top_k: 10
  t3_loss_window_k: 8                   # QUICK TRIAL: loss only on [block_start, last_revealed + 8] per block (0 = off)
  t3_train_layers: "5,6,7,8,9"          # same capacity scope as Stage 1 (back half)
  t3_mask_token_id: 156895

  # ---- Stage-2 on-policy MULTI-PASS rollout (the core of this stage) ----
  t3_rollout_commit_frac: 1.0           # ROLLOUT ON (the Stage-2 gate). Commit SELECTION = confidence-prefix below.
  t3_commit_threshold: 0.6              # confident-prefix commit threshold (talk commit + think_converge)
  t3_rollout_passes: 1                  # J START depth (step-curriculum: 1 for [0,3k))
  t3_rollout_passes_max: 3              # J CAP (anneals 1 -> 2 -> 3)
  t3_rollout_passes_step_every: 3000    #   +1 every 3000 steps: J=1 [0,3k), 2 [3k,6k), 3 [6k+)
  t3_seed_passes: 1                     # think seeds the prime (Path B); decoder reads this too
  t3_keep_mask_residual: true           # exact decode-time input (top-K + mask-residual + renorm)
  t3_converge_max_iters: 8              # cap on think_converge per-pass decode iters (teacher compute guard)

  # ---- per-pass loss = frac*forward_KL(think||talk) + (1-frac)*reverse_KL(talk||think). NO gold CE. ----
  t3_kl_forward_frac: 0.9               # forward-dominant (GKD-style): keeps the talk calibrated; rev sharpens
  t3_stage2_kl_temp: 1.0
  t3_kl_top_k: -1                       # -1 = FULL-vocab KL; set 100 (=10*top_k) to truncate if OOM

  t3_val_every: 200                     # watch val/acc_roll, val/overlap_ratio (rising), val/entropy_gap
  t3_val_size: 64                       #   (narrowing), val/beat_roll; + t3/s2_kl_raw (monitor) + t3/rollout_passes
  t3_keep_best_n: 2

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 3
  max_steps: 12000                      # J reaches its cap (3) at step 6000; ample tail at J=3.
                                        #   Interrupt early if acc_roll/overlap plateau.
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 5.0e-6                            # lower than Stage 1 (continuing from a trained ckpt; on-policy is harder)
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory/compute: J grad talk forwards (backward'd + freed PER pass -> ~1x talk graph) + J think_converge
  # TEACHER decodes (each up to t3_converge_max_iters no-grad 16B forwards) + 1 prime think + 1 prime talk
  # per micro-batch. The think_converge teacher dominates wall-clock; lower t3_converge_max_iters,
  # t3_rollout_passes_max, or t3_kl_top_k if compute/memory-bound.
  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 2000
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  use_wandb: false
  log_steps: 1
