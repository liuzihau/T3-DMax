#
# T3-D, single-GPU SMOKE TEST variant. ~1 hour wall-clock on one H200.
#
# Purpose: validate the end-to-end pipeline (data -> model -> forward -> backward
# -> optimizer step -> checkpoint -> reload) before committing 30 days of GPU time
# to the real run. NOT a hyperparameter-tuned configuration. Do not use the
# resulting checkpoint for evaluation.
#
# Differences from `t3_llada2_mini_bd_oput_1gpu.yaml`:
#   - max_steps: 500              (caps train_steps; VeOmni honors it at arguments.py:680)
#   - save_steps: 250             (one mid-run checkpoint save to exercise the path)
#   - save_epochs: 0              (no end-of-epoch save; max_steps preempts the epoch anyway)
#   - output_dir: ..._smoke_outputs (separate from real run; safe to delete after)
#   - empty_cache_steps: 100      (more frequent to surface VRAM fragmentation early)
#
# Everything else (model, data, optimizer, T3-D rollout config) is identical to the
# 1gpu yaml so the smoke validates the actual training-time stack we intend to use.

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  talk_num_layers: 2
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: true

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.75
  noise_range_high: 0.75
  num_workers: 16

train:
  output_dir: ./t3_llada2_mini_bd_oput_1gpu_smoke_outputs

  # === SMOKE-SPECIFIC ===
  max_steps: 500                        # ~62 min at 7.43 s/it; cap dominates train_steps
  save_steps: 250                       # exercise checkpoint save once mid-run
  save_epochs: 0                        # max_steps preempts the epoch boundary
  empty_cache_steps: 100                # catch fragmentation early
  # ======================

  # Distributed -- single GPU, DDP wrap is a no-op
  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2                   # ignored once max_steps fires
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- SMOKE-SPECIFIC: bumped LR ~50x above DMax's 2.0e-6
  #
  # Why: DMax's 2e-6 is appropriate for FINE-TUNING an already-pretrained 16B model.
  # Our talk model + anchor gate are randomly initialised (trained from scratch); a
  # from-scratch transformer needs lr in the 1e-4 to 1e-3 range. The fine-tune LR
  # leaves talk barely moving over 500 steps -- loss observed flat at log(V).
  #
  # This higher LR will likely destabilise the pretrained LM head and embeddings
  # in any longer run; that's fine here, we're validating pipeline + learning
  # capability, not producing a usable checkpoint. The real 1gpu/2gpu runs should
  # use differential LR (high for talk + alpha + LM head, much lower for everything
  # else) -- separate workstream once smoke validates the basics.
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.03
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- single-GPU specific
  enable_mixed_precision: false         # FSDP-only; DDP path leaves fp32 model
                                        # weights at forward, but VeOmni's fused MoE
                                        # kernel asserts bf16/fp16. Run pure bf16 here.
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false

  # Checkpointing
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # T3-D: OPUT rollout
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  mask_token_id: 156895

  # Logging
  use_wandb: false
  log_steps: 1
