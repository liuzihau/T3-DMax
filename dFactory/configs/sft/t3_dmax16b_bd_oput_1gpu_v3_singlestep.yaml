# T3-D v3 SINGLE-STEP on the DMax-Math-16B backbone (frozen think).
#
# Same single-step training loop as t3_llada2_mini_bd_oput_1gpu_v3_singlestep.yaml;
# only the frozen think WEIGHTS change. DMax-Math-16B is a FINETUNE of
# LLaDA-2.0-mini -- both ARE this same 16B MoE (20 layers, 256 experts, hidden
# 2048, vocab 157184), so the architecture is IDENTICAL. We therefore REUSE the
# mini ThinkTalk config dir unchanged and only swap model_path / tokenizer_path.
# No config regeneration needed.
#
# 10-sec sanity check before launch (arch fields must match the mini config):
#   python -c "import json; c=json.load(open('../DMax-Math-16B/config.json')); \
#     print({k:c.get(k) for k in ['num_hidden_layers','hidden_size','num_experts','vocab_size']})"
#   # expect: 20 / 2048 / 256 / 157184
#
# See the mini v3 yaml for the metric watch-list (training/loss,
# val/acc_still_masked, t3/think_commit_*, etc.).

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4  # arch matches (mini IS the 16B MoE)
  model_path: ../DMax-Math-16B
  tokenizer_path: ../DMax-Math-16B
  attn_implementation: sdpa
  moe_implementation: fused

  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 1.0                  # sigma FIXED at 1.0
  noise_range_high: 1.0
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v3_singlestep_DMAX16B_xattn_talk4_FROZEN_anchorDELTA_sigma100_thr03

  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  enable_mixed_precision: false
  enable_gradient_checkpointing: true   # important for the 16B frozen think's activations
  enable_full_shard: false
  enable_fsdp_offload: false            # flip true if the 16B OOMs on a single GPU
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # === T3-D v3 SINGLE-STEP ===
  t3_single_step: true
  t3_reveal_threshold: 0.3              # think iter-0 commit threshold
  mask_token_id: 156895                 # LLaDA2 family; probe confirmed valid for DMax-16B
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only
  t3_rollout_replace: all_masked
  t3_train_iterations: 1
  t3_train_iterations_min: 1
  t3_n_iter_gate: 0
  t3_sigma_gate: 0.0
  t3_rollout_ratio_low: 0.0
  t3_rollout_ratio_high: 0.0
  t3_rollout_ratio_gate: 0.0
  # ===========================

  t3_val_every: 1000
  t3_val_tail: 50
  t3_val_sigmas: "1.0"

  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v3_singlestep_DMAX16B_sigma100_thr03
  log_steps: 1
