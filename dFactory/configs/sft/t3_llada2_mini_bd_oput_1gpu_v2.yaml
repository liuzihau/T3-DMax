# T3-D v2 PRODUCTION (post leak-fix + redesign).
#
# Architecture = v6e (hybrid_xattn + 4-layer talk + frozen lm_head + zero-init
# delta head). Pulled from the same model_config dir as v6e.
#
# Differences from v6e (t3_llada2_mini_bd_oput_1gpu.yaml):
#   Data
#     - noise_range: 0.65/0.95 -> 0.80/1.00  (see findings_smoke_v2_2026-05-31.md
#       for the sigma tuning saga; the floor is architectural, not curriculum)
#   Training
#     - line-48 SFT-label leak fix in data_transform.py:48 (uncomment)
#     - iter-0 gated no-grad rollout (flag=True only; flag=False skips it)
#     - iter-1+ mask path: teacher-forcing reveal + labels = -100 at teacher-forced
#     - iter-1+ rollout path: full-argmax reveal (labels intact -- OPUT signal)
#     - per-token mean loss reporting (training/loss); legacy mean-of-mean kept as
#       training/loss_legacy_mean_of_mean
#     - D1/D2/D3 wandb tripwires: loss_mask_region, loss_clean_region_LEAK_TRIPWIRE,
#       delta_head_weight_norm
#     - validation anchor-once fix: _run_validation now uses cached anchor
#       (otherwise frozen LLaDA think OOD on modified noisy input -> garbage)
#   Curriculum (3-dim, all with stochastic gates)
#     - t3_train_iterations_min: 2  (NEW; v6e was fixed N=5)
#     - t3_train_iterations: 5      (curriculum ceiling)
#     - t3_n_iter_gate: 1
#     - t3_sigma_gate: 0.10
#     - t3_rollout_ratio_low/high: 0.65/0.95 -> 0.20/0.60  (NEW v2 endpoints)
#     - t3_rollout_ratio_gate: 0.10
#   Validation
#     - t3_val_sigmas: "0.5,0.75" -> "0.80,0.95" (match training distribution)
#
# Read findings_smoke_v2_2026-05-31.md before launching. The training/loss
# headline curve will NOT drop dramatically because of architectural caps
# (M_OBC clean-half visibility + trailing-pad-32 trivial positions in the loss).
# Judge the run by gradient-side metrics: t3/delta_head_weight_norm growth,
# per-iter loss divergence, validation iter_{1+} dropping below iter_0,
# diagnostic v2 on mid-training checkpoints, and GSM8K end eval.

model:
  config_path: ./configs/model_configs/think_talk_llada2_mini_frozen_think_xattn_talk4
  model_path: ../LLaDA2.0-mini-moe-merge
  tokenizer_path: ../LLaDA2.0-mini-moe-merge
  attn_implementation: sdpa
  moe_implementation: fused

  # Visibility only -- model_config dir is the source of truth.
  talk_num_layers: 4
  talk_hidden_size: -1
  talk_num_attention_heads: -1
  talk_num_key_value_heads: -1
  talk_intermediate_size: -1
  anchor_fuser_type: last_only
  anchor_layers: "last"
  anchor_conditioning: gated_residual
  anchor_gate_init: -2.0
  prune_think_last_n_layer: 0
  train_think: false
  train_talk: true
  train_lm_head: false

data:
  train_path: ./my_data/postprocess_train.jsonl
  data_type: conversation
  datasets_type: mapping
  dataloader_type: native
  max_seq_len: 2048
  text_keys: messages
  noise_range_low: 0.80                 # v2 ramp start
  noise_range_high: 1.00                # v2 ramp end (matches inference iter-0)
  num_workers: 16

train:
  output_dir: ./outputs/t3d_1gpu_v2_xattn_talk4_FROZEN_anchorDELTA_curriculum_sigma8010

  # Distributed -- single GPU, DDP wrap is a no-op
  data_parallel_mode: ddp
  tensor_parallel_size: 1
  ulysses_parallel_size: 1
  expert_parallel_size: 1
  global_batch_size: 8                  # grad_accum = 8 to match DMax's per-step batch
  micro_batch_size: 1
  num_train_epochs: 2
  rmpad: false
  rmpad_with_pos_ids: false
  bsz_warmup_ratio: 0.007
  dyn_bsz_margin: 0
  dyn_bsz_buffer_size: 200

  # Optimiser -- LR bumped 50x from DMax's fine-tune setting; see v6e header
  optimizer: adamw
  beta1: 0.9
  beta2: 0.999
  lr: 1.0e-4
  lr_warmup_ratio: 0.005
  lr_decay_style: cosine
  lr_decay_ratio: 1.0
  weight_decay: 0.01
  max_grad_norm: 1.0

  # Memory -- single-GPU
  enable_mixed_precision: false
  enable_gradient_checkpointing: true
  enable_full_shard: false
  enable_fsdp_offload: false
  enable_activation_offload: false
  init_device: cuda
  broadcast_model_weights_from_rank0: false
  enable_full_determinism: false
  empty_cache_steps: 500

  # Checkpointing -- ~4-5h between intra-epoch saves on the long run
  ckpt_manager: dcp
  load_checkpoint_path: ""
  save_steps: 15000
  save_epochs: 1
  save_hf_weights: true

  # Block diffusion (matches DMax)
  block_diffusion_mode: true
  block_size: 32
  same_token_labels: true

  # === T3-D v2 CURRICULUM ===
  # 3-dim ramp with stochastic gates. See training_redesign_plan.md §1.3.
  t3_rollout_mode: dmax_oput
  t3_rollout_target: talk_only          # think runs ONCE per step (anchor cached)
  t3_rollout_replace: all_masked
  t3_reveal_threshold: 0.5              # teacher-force confidence gate (mask path)
  mask_token_id: 156895

  # N curriculum: per-step N sampled from {center-1, center, center+1}, clipped
  # to [1, 7]. Center linearly ramps n_min -> max across training.
  t3_train_iterations: 5                # curriculum ceiling
  t3_train_iterations_min: 2            # curriculum start
  t3_n_iter_gate: 1                     # +/- 1 per step

  # Sigma curriculum: center ramps noise_range_low -> high; per-sample sigma
  # drawn uniformly from [center - sigma_gate, center + sigma_gate], clipped to [0,1].
  t3_sigma_gate: 0.10

  # Rollout-ratio curriculum: Bernoulli p ramps low -> high; per-step p drawn
  # uniformly from [center - rollout_ratio_gate, center + rollout_ratio_gate].
  t3_rollout_ratio_low: 0.20
  t3_rollout_ratio_high: 0.60
  t3_rollout_ratio_gate: 0.10
  # =========================

  # Inline validation -- every N steps, deterministic tail-50, fixed sigmas.
  # Now uses anchor-once pattern (matches training/inference). Sigmas bumped
  # to 0.80/0.95 so val lands inside the training distribution.
  t3_val_every: 5000
  t3_val_tail: 50
  t3_val_sigmas: "0.80,0.95"

  # Logging -- set WANDB_API_KEY in env, or `wandb login` once before launch
  use_wandb: true
  wandb_project: T3-DMax
  wandb_name: t3d_1gpu_v2_xattn_talk4_FROZEN_anchorDELTA_sigma8010_rollout2060_N25
  log_steps: 1
